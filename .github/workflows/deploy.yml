name: Update changelog & deploy

on:
  # Trigger when CMS monorepo pushes a new tag
  repository_dispatch:
    types: [cms-release]
  # Manual trigger
  workflow_dispatch:
  # Auto on push to main (content changes)
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'src/**'
      - 'scripts/**'
      - 'public/**'
      - '.github/workflows/**'
      - 'Dockerfile'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for changelog generation

      # Check out the cms monorepo too — seed-full-changelog.ts scrapes
      # its git tags + commit log. Public repo, no token needed.
      - name: Checkout @webhouse/cms repo
        uses: actions/checkout@v4
        with:
          repository: webhousecode/cms
          # Outside the cms-docs workspace so Next.js doesn't try to
          # type-check the cms repo's example sites during build.
          path: ../cms-source
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Auto-regenerate changelog from cms repo's tags + commit log so
      # it never goes stale between manual seeds. Replaces JSON files in
      # content/changelog/ on every build (idempotent — same tags →
      # same output).
      - name: Regenerate changelog from cms repo
        run: npx tsx scripts/seed-full-changelog.ts
        env:
          CMS_REPO: ${{ github.workspace }}/../cms-source

      # Build
      - run: pnpm build

      # Deploy to Fly.io
      - run: curl -L https://fly.io/install.sh | sh
      - run: ~/.fly/bin/flyctl deploy --remote-only --now
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
